name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache: true 

    - name: Install dependencies
      run: go mod download

    - name: Build
      run: go build -v ./cmd/gopher-wisdom

    - name: Test
      run: go test -v ./internal/quotes/...